version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_rede_social
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: lagunalivinglab2026
      POSTGRES_DB: rede_social_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: